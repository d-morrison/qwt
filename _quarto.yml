profile:
  default: website

bibliography: references.bib

editor_options:
  chunk_output_type: console

editor:
  markdown:
    wrap: 72

execute:
  warning: false
  message: false
  cache: false
  freeze: auto

filters:
  - slidebreak
  - equation-anchors
  - revealjs-level1-slide-breaks.lua

knitr:
  opts_chunk:
    collapse: true
    comment: "#>"
